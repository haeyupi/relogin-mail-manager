<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>邮箱重新登录</title>
  <style>
    :root {
      color-scheme: light;
      --bg:#f4f6fa;
      --panel:#ffffff;
      --panel-2:#f9fafc;
      --ink:#111827;
      --muted:#667085;
      --soft:#98a2b3;
      --line:#e4e7ec;
      --dark:#111827;
      --blue:#2563eb;
      --blue-soft:#dbeafe;
      --green:#047857;
      --green-soft:#dcfce7;
      --amber:#b45309;
      --amber-soft:#fef3c7;
      --red:#b42318;
      --red-soft:#fee4e2;
      --violet:#6d28d9;
      --violet-soft:#ede9fe;
      --shadow:0 16px 40px rgba(15, 23, 42, .08);
    }
    * { box-sizing:border-box; }
    html, body { max-width:100%; overflow-x:hidden; }
    body {
      margin:0;
      font-family:Inter,Arial,"Microsoft YaHei",sans-serif;
      background:var(--bg);
      color:var(--ink);
      font-size:14px;
      letter-spacing:0;
    }
    button, input, select { font:inherit; letter-spacing:0; }
    button {
      height:36px;
      border:1px solid var(--dark);
      border-radius:6px;
      padding:0 13px;
      background:var(--dark);
      color:#fff;
      cursor:pointer;
      white-space:nowrap;
    }
    button.secondary { background:#fff; color:var(--dark); border-color:var(--line); }
    button.blue { background:var(--blue); border-color:var(--blue); }
    button.danger { background:#fff; color:var(--red); border-color:#f5b5ae; }
    button:disabled { opacity:.52; cursor:not-allowed; }
    input, select {
      width:100%;
      height:36px;
      border:1px solid var(--line);
      border-radius:6px;
      padding:0 10px;
      background:#fff;
      color:var(--ink);
      min-width:0;
      outline:none;
    }
    input:focus, select:focus { border-color:#93c5fd; box-shadow:0 0 0 3px rgba(37, 99, 235, .12); }
    input[type="checkbox"] { width:16px; height:16px; padding:0; accent-color:var(--blue); }
    input[type="file"] { padding:6px 10px; }
    label { display:grid; gap:6px; color:var(--muted); font-size:12px; }
    .layout { width:100%; max-width:100vw; min-height:100vh; display:grid; grid-template-columns:224px minmax(0,1fr); overflow:hidden; }
    .sidebar {
      background:#0f172a;
      color:#e5e7eb;
      padding:18px 14px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .brand { display:flex; align-items:center; gap:11px; padding:4px 6px 14px; border-bottom:1px solid rgba(255,255,255,.09); }
    .brand-mark {
      width:34px;
      height:34px;
      display:grid;
      place-items:center;
      border-radius:8px;
      background:#2563eb;
      font-weight:800;
    }
    .brand strong { display:block; font-size:15px; }
    .brand span { display:block; color:#9ca3af; font-size:12px; margin-top:2px; }
    .nav { display:grid; gap:6px; }
    .nav a {
      display:flex;
      align-items:center;
      gap:9px;
      height:36px;
      padding:0 10px;
      color:#cbd5e1;
      text-decoration:none;
      border-radius:6px;
    }
    .nav a.active { background:#1e293b; color:#fff; }
    .nav-dot { width:7px; height:7px; border-radius:999px; background:#60a5fa; }
    .side-note {
      margin-top:auto;
      border:1px solid rgba(255,255,255,.1);
      border-radius:8px;
      padding:10px;
      color:#cbd5e1;
      display:grid;
      gap:6px;
      font-size:12px;
    }
    .side-note code { color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .workspace { min-width:0; width:100%; max-width:100%; display:grid; grid-template-columns:minmax(0,1fr); grid-template-rows:auto 1fr; overflow:hidden; }
    .topbar {
      width:100%;
      min-width:0;
      max-width:100%;
      height:72px;
      padding:0 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      background:#fff;
      border-bottom:1px solid var(--line);
    }
    .eyebrow { margin:0 0 5px; color:var(--muted); font-size:12px; }
    h1 { margin:0; font-size:22px; line-height:1.15; }
    h2 { margin:0; font-size:15px; }
    .top-actions { display:flex; align-items:center; gap:10px; min-width:0; }
    .chip {
      max-width:420px;
      min-width:0;
      height:30px;
      display:flex;
      align-items:center;
      border:1px solid var(--line);
      border-radius:999px;
      padding:0 11px;
      color:var(--muted);
      background:#fff;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:12px;
    }
    .content { width:100%; min-width:0; max-width:100%; padding:18px 24px 30px; display:grid; gap:16px; }
    .panel {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:8px;
      box-shadow:var(--shadow);
      min-width:0;
      max-width:100%;
    }
    .panel-head {
      min-height:54px;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid var(--line);
    }
    .panel-body { padding:14px 16px 16px; }
    .grid { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:10px; align-items:end; }
    .field-wide { grid-column:span 2; }
    .field-action { display:flex; align-items:end; }
    .toolbar { display:flex; flex-wrap:wrap; gap:9px; align-items:end; }
    .status-line { color:var(--muted); font-size:13px; min-height:18px; }
    .summary {
      display:grid;
      grid-template-columns:repeat(5,minmax(120px,1fr));
      gap:10px;
      margin-top:12px;
    }
    .stat {
      border:1px solid var(--line);
      border-radius:8px;
      padding:12px;
      background:#fff;
      min-height:74px;
    }
    .stat span { display:block; color:var(--muted); font-size:12px; }
    .stat strong { display:block; margin-top:7px; font-size:25px; line-height:1; }
    .stat.normal strong { color:var(--green); }
    .stat.dropped strong { color:var(--amber); }
    .stat.unavailable strong { color:var(--red); }
    .stat.unknown strong { color:var(--violet); }
    .two-col { display:grid; grid-template-columns:minmax(0,1.35fr) minmax(360px,.65fr); gap:16px; align-items:start; }
    .table-tools {
      display:grid;
      grid-template-columns:minmax(220px,1fr) 150px auto auto auto;
      gap:9px;
      align-items:end;
    }
    .selected-count { color:var(--muted); font-size:13px; align-self:center; white-space:nowrap; }
    .account-scroll {
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:8px;
      max-height:min(540px, calc(100vh - 360px));
      overflow:auto;
      background:#fff;
    }
    table { width:100%; min-width:900px; border-collapse:separate; border-spacing:0; table-layout:fixed; }
    th, td {
      border-bottom:1px solid var(--line);
      padding:10px 9px;
      text-align:left;
      vertical-align:middle;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    th {
      position:sticky;
      top:0;
      z-index:1;
      background:#f8fafc;
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }
    tr:last-child td { border-bottom:0; }
    th.select, td.select { width:42px; text-align:center; }
    .email-cell {
      font-weight:600;
      white-space:normal;
      overflow-wrap:anywhere;
      line-height:1.35;
    }
    .status-badge {
      display:inline-flex;
      align-items:center;
      height:24px;
      border-radius:999px;
      padding:0 9px;
      font-size:12px;
      border:1px solid transparent;
    }
    .status-badge.normal { color:var(--green); background:var(--green-soft); border-color:#bbf7d0; }
    .status-badge.dropped { color:var(--amber); background:var(--amber-soft); border-color:#fde68a; }
    .status-badge.unavailable { color:var(--red); background:var(--red-soft); border-color:#fecaca; }
    .status-badge.unknown { color:var(--violet); background:var(--violet-soft); border-color:#ddd6fe; }
    .remote-cell { color:#344054; }
    .failure-cell {
      color:var(--muted);
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
      overflow-wrap:anywhere;
      line-height:1.45;
    }
    .muted { color:var(--muted); }
    .row-action { height:30px; padding:0 9px; }
    .job-card { display:grid; gap:12px; }
    .job-meta {
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px;
    }
    .job-meta div {
      border:1px solid var(--line);
      border-radius:8px;
      padding:9px 10px;
      background:var(--panel-2);
      min-width:0;
    }
    .job-meta span { display:block; color:var(--muted); font-size:12px; }
    .job-meta strong { display:block; margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .progress { height:9px; border-radius:999px; background:#edf2f7; overflow:hidden; }
    .bar { height:100%; width:0; background:linear-gradient(90deg,#2563eb,#10b981); transition:width .2s; }
    pre {
      margin:0;
      padding:12px;
      background:#0b1220;
      color:#e5edf8;
      border-radius:8px;
      min-height:260px;
      max-height:540px;
      overflow:auto;
      white-space:pre-wrap;
      line-height:1.5;
      font-size:12px;
    }
    .empty-row { color:var(--muted); text-align:center; height:86px; }
    @media (max-width:1180px) {
      .layout { display:block; }
      .sidebar { display:none; }
      .two-col { grid-template-columns:1fr; }
      .summary { grid-template-columns:repeat(3,minmax(120px,1fr)); }
    }
    @media (max-width:820px) {
      .topbar { height:auto; padding:14px 16px; align-items:flex-start; flex-direction:column; }
      .top-actions { width:100%; flex-wrap:wrap; }
      .top-actions .chip:first-child { flex:1 1 180px; }
      .content { padding:14px; }
      .grid { grid-template-columns:1fr 1fr; }
      .field-wide { grid-column:span 2; }
      .table-tools { grid-template-columns:minmax(0,1fr) minmax(0,1fr); width:100%; }
      .table-tools > * { min-width:0; }
      .table-tools button { width:100%; padding:0 8px; }
      .summary { grid-template-columns:1fr 1fr; }
      .hide-sm { display:none; }
      .job-meta { grid-template-columns:1fr 1fr; }
      .chip { max-width:100%; }
    }
    @media (max-width:560px) {
      .grid { grid-template-columns:1fr; }
      .field-wide { grid-column:span 1; }
      .field-action { display:block; }
      .field-action button { width:100%; }
      .summary { grid-template-columns:1fr; }
      .panel-head { align-items:flex-start; flex-direction:column; }
      .panel-head .toolbar { width:100%; }
      .panel-head .toolbar button { flex:1; }
      .table-tools { grid-template-columns:1fr; }
      .job-meta { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">R</div>
        <div><strong>Relogin</strong><span>Mail Manager</span></div>
      </div>
      <nav class="nav">
        <a class="active" href="#overview"><span class="nav-dot"></span>控制台</a>
        <a href="#accounts"><span class="nav-dot"></span>邮箱列表</a>
        <a href="#logs"><span class="nav-dot"></span>任务日志</a>
      </nav>
      <div class="side-note">
        <span>Mail DB</span>
        <code id="sideDbPath">loading</code>
      </div>
    </aside>
    <div class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Outlook Mail + CPA/Sub2API</p>
          <h1>邮箱重登工作台</h1>
        </div>
        <div class="top-actions">
          <span class="chip" id="dbPath">loading</span>
          <span class="chip" id="syncStatus">就绪</span>
        </div>
      </header>
      <main class="content">
        <section class="panel" id="overview">
          <div class="panel-head">
            <h2>目标配置</h2>
            <span class="status-line" id="configStatus"></span>
          </div>
          <div class="panel-body">
            <form id="configForm" class="grid">
              <label>Provider
                <select name="provider">
                  <option value="">仅本地保存</option>
                  <option value="cpa">CPA</option>
                  <option value="sub2api">Sub2API</option>
                </select>
              </label>
              <label class="field-wide">地址<input name="base_url" placeholder="https://example.com"></label>
              <label class="field-wide">管理密钥<input name="management_key" type="password" placeholder="留空则不改"></label>
              <label>Sub2API 并发<input name="sub2api_concurrency" type="number" min="1" max="50"></label>
              <label>Sub2API 优先级<input name="sub2api_priority" type="number" min="1" max="1000"></label>
              <div class="field-action"><button type="submit" class="blue">保存配置</button></div>
            </form>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>导入与同步</h2>
            <div class="toolbar">
              <button type="button" class="blue" id="syncBtn">全量更新</button>
              <button type="button" class="secondary" id="refreshBtn">本地重载</button>
            </div>
          </div>
          <div class="panel-body">
            <form id="importForm" class="toolbar">
              <label class="field-wide">原项目导出 ZIP
                <input name="file" id="zipFile" type="file" accept=".zip" required>
              </label>
              <div class="field-action"><button type="submit">导入 ZIP</button></div>
              <span class="status-line" id="importStatus"></span>
            </form>
            <div class="summary" id="summary"></div>
          </div>
        </section>

        <div class="two-col">
          <section class="panel" id="accounts">
            <div class="panel-head">
              <h2>邮箱列表</h2>
              <span class="selected-count" id="selectedCount">已选 0</span>
            </div>
            <div class="panel-body">
              <div class="table-tools">
                <label>搜索<input id="search" placeholder="email / phone / reason"></label>
                <label>状态
                  <select id="status">
                    <option value="">全部</option>
                    <option value="unknown">unknown</option>
                    <option value="normal">normal</option>
                    <option value="dropped">dropped</option>
                    <option value="unavailable">unavailable</option>
                  </select>
                </label>
                <button type="button" class="secondary" id="selectVisibleBtn">选择当前</button>
                <button type="button" class="secondary" id="clearSelectionBtn">清空选择</button>
                <button type="button" id="batchReloginBtn">批量重登</button>
              </div>
              <div class="account-scroll">
                <table>
                  <colgroup>
                    <col style="width:42px;">
                    <col style="width:210px;">
                    <col style="width:135px;">
                    <col style="width:120px;">
                    <col style="width:130px;">
                    <col>
                    <col style="width:92px;">
                  </colgroup>
                  <thead>
                    <tr>
                      <th class="select"><input id="selectAllVisible" type="checkbox"></th>
                      <th>Email</th>
                      <th class="hide-sm">Phone</th>
                      <th>Status</th>
                      <th>Remote</th>
                      <th>Failure</th>
                      <th style="width:92px;">Action</th>
                    </tr>
                  </thead>
                  <tbody id="accountRows"></tbody>
                </table>
              </div>
            </div>
          </section>

          <section class="panel" id="logs">
            <div class="panel-head">
              <h2>任务日志</h2>
              <button type="button" class="secondary" id="restoreLogBtn">恢复最近日志</button>
            </div>
            <div class="panel-body job-card">
              <div class="job-meta" id="jobMeta"></div>
              <div class="progress"><div class="bar" id="jobBar"></div></div>
              <pre id="jobLogs">等待任务...</pre>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
  <script>
    let currentJob = "";
    let pollTimer = 0;
    let latestTimer = 0;
    let visibleEmails = [];
    let latestJobSnapshot = null;
    const selectedEmails = new Set();
    const $ = id => document.getElementById(id);
    const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const statusLabels = {total:"全部", normal:"正常", dropped:"异常", unavailable:"不可用", unknown:"未同步"};
    const statusOrder = ["total", "normal", "dropped", "unavailable", "unknown"];

    function setStatus(message) { $("syncStatus").textContent = message || "就绪"; }
    function setConfigStatus(message) { $("configStatus").textContent = message || ""; }
    function setImportStatus(message) { $("importStatus").textContent = message || ""; }
    async function api(url, options={}) {
      const res = await fetch(url, options);
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.error) throw new Error(data.error || data.message || res.statusText);
      return data;
    }
    function renderSummary(summary) {
      $("summary").innerHTML = statusOrder.map(key => {
        const cls = key === "total" ? "" : key;
        return `<div class="stat ${esc(cls)}"><span>${esc(statusLabels[key] || key)}</span><strong>${esc(summary?.[key] ?? 0)}</strong></div>`;
      }).join("");
    }
    function statusBadge(status) {
      const cls = status || "unknown";
      return `<span class="status-badge ${esc(cls)}">${esc(cls)}</span>`;
    }
    function remoteText(row) {
      const provider = row.remote_provider || "";
      const name = row.remote_name || row.remote_id || "";
      return [provider, name].filter(Boolean).join(" ") || "-";
    }
    function renderAccounts(accounts) {
      visibleEmails = accounts.map(row => row.email);
      if (!accounts.length) {
        $("accountRows").innerHTML = `<tr><td class="empty-row" colspan="7">没有匹配账号</td></tr>`;
        updateSelectionUi();
        return;
      }
      $("accountRows").innerHTML = accounts.map(row => `
        <tr>
          <td class="select"><input class="rowCheck" type="checkbox" data-email="${esc(row.email)}" ${selectedEmails.has(row.email) ? "checked" : ""}></td>
          <td class="email-cell" title="${esc(row.email)}">${esc(row.email)}</td>
          <td class="hide-sm" title="${esc(row.phone_number)}">${esc(row.phone_number || "-")}</td>
          <td>${statusBadge(row.status)}</td>
          <td class="remote-cell" title="${esc(remoteText(row))}">${esc(remoteText(row))}</td>
          <td class="failure-cell" title="${esc(row.failure_reason)}">${esc(row.failure_reason || "-")}</td>
          <td><button type="button" class="secondary row-action" data-email="${esc(row.email)}">重登</button></td>
        </tr>`).join("");
      document.querySelectorAll("button[data-email]").forEach(btn => btn.onclick = () => startRelogin(btn.dataset.email).catch(showError));
      document.querySelectorAll(".rowCheck").forEach(box => {
        box.onchange = () => {
          if (box.checked) selectedEmails.add(box.dataset.email);
          else selectedEmails.delete(box.dataset.email);
          updateSelectionUi();
        };
      });
      updateSelectionUi();
    }
    function fillConfig(data) {
      $("dbPath").textContent = data.config.mail_db;
      $("sideDbPath").textContent = data.config.mail_db;
      const target = data.config.target;
      const form = $("configForm");
      form.provider.value = target.provider || "";
      form.base_url.value = target.base_url || "";
      form.management_key.placeholder = target.management_key_masked || "留空则不改";
      form.sub2api_concurrency.value = target.sub2api_concurrency || 3;
      form.sub2api_priority.value = target.sub2api_priority || 50;
    }
    async function loadState({quiet=false}={}) {
      const q = new URLSearchParams({search:$("search").value, status:$("status").value});
      const data = await api("/api/accounts?" + q.toString());
      fillConfig(data);
      renderSummary(data.summary || {});
      renderAccounts(data.accounts || []);
      if (!quiet) setStatus(`本地已加载 ${new Date().toLocaleTimeString()}`);
      return data;
    }
    function updateSelectionUi() {
      $("selectedCount").textContent = `已选 ${selectedEmails.size}`;
      $("batchReloginBtn").disabled = selectedEmails.size === 0;
      $("selectAllVisible").checked = visibleEmails.length > 0 && visibleEmails.every(email => selectedEmails.has(email));
    }
    function renderJob(job) {
      if (job) latestJobSnapshot = job;
      const snapshot = latestJobSnapshot;
      if (!snapshot) {
        $("jobMeta").innerHTML = `
          <div><span>任务</span><strong>-</strong></div>
          <div><span>状态</span><strong>-</strong></div>
          <div><span>进度</span><strong>0/0</strong></div>
          <div><span>结果</span><strong>ok=0 failed=0</strong></div>`;
        $("jobBar").style.width = "0%";
        return;
      }
      $("jobMeta").innerHTML = `
        <div><span>任务</span><strong title="${esc(snapshot.target || "")}">${esc(snapshot.kind || "-")}</strong></div>
        <div><span>状态</span><strong>${esc(snapshot.status || "-")}</strong></div>
        <div><span>进度</span><strong>${esc(snapshot.done || 0)}/${esc(snapshot.total || 0)}</strong></div>
        <div><span>结果</span><strong>ok=${esc(snapshot.ok || 0)} failed=${esc(snapshot.failed || 0)}</strong></div>`;
      $("jobBar").style.width = `${snapshot.percent || 0}%`;
      const text = (snapshot.logs || []).join("\\n") || "任务已启动，等待日志...";
      if ($("jobLogs").textContent !== text) {
        $("jobLogs").textContent = text;
        $("jobLogs").scrollTop = $("jobLogs").scrollHeight;
      }
    }
    function showError(err) {
      const message = err?.message || String(err);
      setStatus(message);
      alert(message);
    }
    function setCurrentJob(jobId) {
      currentJob = jobId || "";
      try {
        if (currentJob) window.localStorage.setItem("mailReloginCurrentJob", currentJob);
        else window.localStorage.removeItem("mailReloginCurrentJob");
      } catch (_) {}
    }
    function scheduleJobPoll(delay=1500) {
      window.clearTimeout(pollTimer);
      if (currentJob) {
        pollTimer = window.setTimeout(() => pollJob(), delay);
      }
    }
    async function pollJob() {
      if (!currentJob) return;
      let job;
      try {
        job = await api("/api/jobs/" + currentJob);
      } catch (err) {
        setStatus(`任务轮询失败，自动重试：${err?.message || err}`);
        scheduleJobPoll(3000);
        return;
      }
      renderJob(job);
      setStatus(`任务 ${job.status} ${job.done}/${job.total}`);
      if (job.status === "running") {
        scheduleJobPoll(1500);
      } else {
        setCurrentJob("");
        window.clearTimeout(pollTimer);
        await loadState({quiet:true});
        setStatus(`任务完成 ${job.ok}/${job.total}`);
      }
    }
    async function restoreLatestJob() {
      const data = await api("/api/jobs/latest");
      if (data.job) {
        latestJobSnapshot = data.job;
        renderJob(data.job);
        if (data.job.status === "running") {
          setCurrentJob(data.job.id);
          scheduleJobPoll(300);
        } else if (currentJob === data.job.id) {
          setCurrentJob("");
          window.clearTimeout(pollTimer);
        }
      } else {
        renderJob(null);
      }
    }
    async function reconcileLatestJob() {
      const data = await api("/api/jobs/latest");
      if (!data.job) return;
      const oldLogs = latestJobSnapshot?.logs || [];
      const newLogs = data.job.logs || [];
      const changed = !latestJobSnapshot
        || latestJobSnapshot.id !== data.job.id
        || latestJobSnapshot.status !== data.job.status
        || latestJobSnapshot.done !== data.job.done
        || oldLogs.length !== newLogs.length;
      if (!changed) return;
      renderJob(data.job);
      if (data.job.status === "running") {
        setCurrentJob(data.job.id);
        scheduleJobPoll(300);
      } else {
        if (currentJob === data.job.id) {
          setCurrentJob("");
          window.clearTimeout(pollTimer);
        }
        await loadState({quiet:true});
      }
    }
    function startLatestReconciler() {
      window.clearInterval(latestTimer);
      latestTimer = window.setInterval(() => {
        reconcileLatestJob().catch(err => setStatus(`最新任务刷新失败：${err?.message || err}`));
      }, 3000);
      window.addEventListener("focus", () => reconcileLatestJob().catch(() => {}));
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) reconcileLatestJob().catch(() => {});
      });
    }
    async function startSyncStatus() {
      $("syncBtn").disabled = true;
      try {
        setStatus("正在全量更新远端状态...");
        const data = await api("/api/sync", {method:"POST"});
        setCurrentJob(data.job_id);
        renderJob({id:data.job_id, kind:"sync", status:"running", total:0, done:0, ok:0, failed:0, percent:0, logs:["任务已创建，等待远端响应..."]});
        await pollJob();
      } finally {
        $("syncBtn").disabled = false;
      }
    }
    async function startRelogin(email) {
      const data = await api("/api/relogin/" + encodeURIComponent(email), {method:"POST"});
      setCurrentJob(data.job_id);
      renderJob({id:data.job_id, kind:"relogin", status:"running", total:1, done:0, ok:0, failed:0, percent:0, logs:[`${email} 重登任务已创建...`]});
      await pollJob();
    }
    async function startBatchRelogin() {
      const emails = Array.from(selectedEmails);
      if (!emails.length) return;
      const data = await api("/api/relogin-batch", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({emails})});
      setCurrentJob(data.job_id);
      renderJob({id:data.job_id, kind:"relogin-batch", status:"running", total:emails.length, done:0, ok:0, failed:0, percent:0, logs:[`批量重登任务已创建：${emails.length} 个邮箱...`]});
      await pollJob();
    }
    $("configForm").onsubmit = async ev => {
      ev.preventDefault();
      setConfigStatus("保存中...");
      const fd = new FormData(ev.currentTarget);
      await api("/api/config", {method:"POST", body:fd});
      ev.currentTarget.management_key.value = "";
      await loadState({quiet:true});
      setConfigStatus(`已保存 ${new Date().toLocaleTimeString()}`);
    };
    $("importForm").onsubmit = async ev => {
      ev.preventDefault();
      setImportStatus("导入中...");
      await api("/api/import-zip", {method:"POST", body:new FormData(ev.currentTarget)});
      ev.currentTarget.reset();
      await loadState({quiet:true});
      setImportStatus(`导入完成 ${new Date().toLocaleTimeString()}`);
    };
    $("syncBtn").onclick = () => startSyncStatus().catch(showError);
    $("refreshBtn").onclick = async () => {
      try {
        setStatus("正在重载本地列表...");
        await loadState({quiet:true});
        setStatus(`本地已重载 ${new Date().toLocaleTimeString()}`);
      } catch (err) {
        showError(err);
      }
    };
    $("restoreLogBtn").onclick = () => restoreLatestJob().catch(showError);
    $("selectVisibleBtn").onclick = () => {
      visibleEmails.forEach(email => selectedEmails.add(email));
      document.querySelectorAll(".rowCheck").forEach(box => box.checked = true);
      updateSelectionUi();
    };
    $("clearSelectionBtn").onclick = () => { selectedEmails.clear(); updateSelectionUi(); document.querySelectorAll(".rowCheck").forEach(box => box.checked = false); };
    $("selectAllVisible").onchange = ev => {
      if (ev.currentTarget.checked) visibleEmails.forEach(email => selectedEmails.add(email));
      else visibleEmails.forEach(email => selectedEmails.delete(email));
      document.querySelectorAll(".rowCheck").forEach(box => box.checked = ev.currentTarget.checked);
      updateSelectionUi();
    };
    $("batchReloginBtn").onclick = () => startBatchRelogin().catch(showError);
    let searchTimer = 0;
    $("search").oninput = () => {
      window.clearTimeout(searchTimer);
      searchTimer = window.setTimeout(() => loadState({quiet:true}).catch(showError), 220);
    };
    $("status").onchange = () => loadState({quiet:true}).catch(showError);
    loadState().then(() => {
      try { currentJob = window.localStorage.getItem("mailReloginCurrentJob") || ""; } catch (_) {}
      startLatestReconciler();
      return restoreLatestJob();
    }).catch(err => {
      $("jobLogs").textContent = err.message;
      setStatus(err.message);
    });
  </script>
</body>
</html>
